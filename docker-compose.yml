version: "3"

services:
  backend:
    build: ./backend
    ports:
      - "10000:10000"
    env_file:
      - ./backend/.env
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 10000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    restart: always
    command: npm start